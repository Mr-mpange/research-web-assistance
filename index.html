<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Web Assistance</title>
    <meta name="description" content="AI-Powered Multi-Researcher Platform" />

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var params = l.search.slice(1).split('&');
          var path = params[0].slice(2).replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (path ? '/' + path : '/') + query + l.hash
          );
        }
      }(window.location));
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
